<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南网采购平台 - 数据爬取系统</title>
    <meta name="description" content="中国南方电网采购公告自动爬取与管理系统">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>南网采购平台 · 数据爬取系统</h1>
            </div>
            <div class="header-status" id="headerStatus">
                <span class="status-dot"></span>
                <span class="status-text">就绪</span>
            </div>
        </div>
    </header>

    <!-- 主内容 -->
    <main class="main">
        <!-- Tab 导航 -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="settings" onclick="switchTab('settings')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
                爬取设置
            </button>
            <button class="tab-btn" data-tab="data" onclick="switchTab('data')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="3" y1="9" x2="21" y2="9" />
                    <line x1="9" y1="21" x2="9" y2="9" />
                </svg>
                数据展示
            </button>
        </nav>

        <!-- ========== 爬取设置模块 ========== -->
        <section class="tab-content active" id="tab-settings">
            <div class="settings-grid">
                <!-- 爬取配置卡片 -->
                <div class="card">
                    <div class="card-header">
                        <h2>📋 爬取配置</h2>
                    </div>
                    <div class="card-body">
                        <!-- 爬取来源 -->
                        <div class="form-group">
                            <label class="form-label">爬取来源</label>
                            <div class="checkbox-group">
                                <label class="checkbox-item">
                                    <input type="checkbox" id="src-bidding" value="bidding.csg.cn" checked>
                                    <span class="checkbox-custom"></span>
                                    <span>南网供应链 (bidding.csg.cn)</span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" id="src-ecsg" value="ecsg.com.cn" checked>
                                    <span class="checkbox-custom"></span>
                                    <span>电子交易平台 (ecsg.com.cn)</span>
                                </label>
                            </div>
                        </div>

                        <!-- 类别选择 -->
                        <div class="form-group">
                            <label class="form-label">公告类别</label>
                            <div class="checkbox-group">
                                <label class="checkbox-item">
                                    <input type="checkbox" id="cat-engineering" value="工程" checked>
                                    <span class="checkbox-custom"></span>
                                    <span>工程</span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" id="cat-service" value="服务" checked>
                                    <span class="checkbox-custom"></span>
                                    <span>服务</span>
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" id="cat-goods" value="货物">
                                    <span class="checkbox-custom"></span>
                                    <span>货物</span>
                                </label>
                            </div>
                            <p class="form-hint">自动过滤公示公告，仅爬取招标公告和非招标公告</p>
                        </div>

                        <!-- 公司筛选 -->
                        <div class="form-group">
                            <label class="form-label">发布单位（模糊搜索）</label>
                            <div class="autocomplete-wrapper">
                                <input type="text" id="companyFilter" class="form-input"
                                    placeholder="输入公司名称关键词，如&quot;广东电网&quot;" autocomplete="off">
                                <div class="autocomplete-list" id="companyList"></div>
                            </div>
                            <p class="form-hint">留空则爬取全部单位的公告</p>
                        </div>

                        <!-- 项目名称关键词过滤 -->
                        <div class="form-group">
                            <label class="form-label">项目名称关键词过滤</label>
                            <input type="text" id="titleKeywords" class="form-input"
                                placeholder="输入关键词，多个用逗号分隔，如&quot;电缆,变压器,光伏&quot;">
                            <p class="form-hint">留空则不过滤；填写后将剔除标题中包含任一关键词的公告</p>
                        </div>

                        <!-- 爬取天数 -->
                        <div class="form-group">
                            <label class="form-label">爬取天数</label>
                            <select id="scrapeDays" class="form-select">
                                <option value="1">最近 1 天</option>
                                <option value="3" selected>最近 3 天</option>
                                <option value="5">最近 5 天</option>
                                <option value="7">最近 7 天</option>
                            </select>
                        </div>

                        <!-- 最大翻页数 -->
                        <div class="form-group">
                            <label class="form-label">每类别最大翻页数</label>
                            <select id="maxPages" class="form-select">
                                <option value="3">3 页</option>
                                <option value="5" selected>5 页</option>
                                <option value="10">10 页</option>
                            </select>
                        </div>

                        <div class="form-actions">
                            <button class="btn btn-primary btn-lg" id="btnScrapeNow" onclick="startScrape()">
                                🚀 立即爬取
                            </button>
                            <button class="btn btn-secondary" onclick="saveSettings()">
                                💾 保存设置
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 定时任务 & 导出 卡片 -->
                <div class="card">
                    <div class="card-header">
                        <h2>⏰ 定时任务 & 导出</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">定时执行时间</label>
                            <div class="time-picker">
                                <select id="scheduleHour" class="form-select time-select">
                                    <!-- 0-23 小时 -->
                                </select>
                                <span class="time-sep">:</span>
                                <select id="scheduleMinute" class="form-select time-select">
                                    <!-- 0-59 分钟 -->
                                </select>
                            </div>
                            <p class="form-hint">每天在指定时间自动爬取</p>
                        </div>

                        <div class="form-group">
                            <label class="form-label">自动导出 Excel</label>
                            <div class="checkbox-group">
                                <label class="checkbox-item">
                                    <input type="checkbox" id="autoExport">
                                    <span class="checkbox-custom"></span>
                                    <span>爬取完成后自动导出 Excel 文件</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group" id="exportDirGroup">
                            <label class="form-label">Excel 导出目录</label>
                            <div class="input-with-btn">
                                <input type="text" id="exportDir" class="form-input" value="./data/exports"
                                    placeholder="文件保存路径">
                                <button class="btn btn-ghost" type="button" onclick="openFolderPicker()">📂 浏览</button>
                            </div>
                        </div>

                        <button class="btn btn-secondary" onclick="saveSettings()">
                            💾 保存设置
                        </button>
                    </div>
                </div>

                <!-- 运行状态卡片 -->
                <div class="card card-full">
                    <div class="card-header">
                        <h2>📡 运行状态</h2>
                        <button class="btn btn-ghost btn-sm" onclick="refreshStatus()">刷新</button>
                    </div>
                    <div class="card-body">
                        <div class="status-bar">
                            <div class="status-item">
                                <span class="status-label">运行状态</span>
                                <span class="status-value" id="runningStatus">-</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">上次执行</span>
                                <span class="status-value" id="lastRunTime">-</span>
                            </div>
                            <div class="status-item">
                                <span class="status-label">上次结果</span>
                                <span class="status-value" id="lastResult">-</span>
                            </div>
                        </div>
                        <div class="progress-log" id="progressLog">
                            <p class="log-placeholder">暂无运行日志</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ========== 数据展示模块 ========== -->
        <section class="tab-content" id="tab-data">
            <!-- 筛选条件 -->
            <div class="card filter-card">
                <div class="filter-bar">
                    <div class="filter-item">
                        <label>类别</label>
                        <select id="filterCategory" class="form-select" onchange="loadData()">
                            <option value="">全部</option>
                            <option value="工程">工程</option>
                            <option value="服务">服务</option>
                            <option value="货物">货物</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>来源</label>
                        <select id="filterSource" class="form-select" onchange="loadData()">
                            <option value="">全部</option>
                            <option value="bidding.csg.cn">南网供应链</option>
                            <option value="ecsg.com.cn">电子交易平台</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>发布单位</label>
                        <input type="text" id="filterCompany" class="form-input" placeholder="模糊搜索"
                            onchange="loadData()">
                    </div>
                    <div class="filter-item">
                        <label>开始日期</label>
                        <input type="text" id="filterDateFrom" class="form-input" placeholder="MM-DD" maxlength="5"
                            onchange="loadData()">
                    </div>
                    <div class="filter-item">
                        <label>结束日期</label>
                        <input type="text" id="filterDateTo" class="form-input" placeholder="MM-DD" maxlength="5"
                            onchange="loadData()">
                    </div>
                    <div class="filter-item">
                        <label>关键词</label>
                        <input type="text" id="filterKeyword" class="form-input" placeholder="标题关键词">
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-primary" onclick="loadData()">🔍 查询</button>
                        <button class="btn btn-secondary" onclick="exportExcel()">📥 导出 Excel</button>
                    </div>
                </div>
            </div>

            <!-- 数据表格 -->
            <div class="card">
                <div class="card-header">
                    <h2 id="dataTitle">公告列表</h2>
                    <span class="badge" id="totalCount">0 条</span>
                </div>
                <div class="table-wrapper">
                    <table class="data-table" id="dataTable">
                        <thead>
                            <tr>
                                <th width="40">#</th>
                                <th>采购项目名称</th>
                                <th width="100">采购类型</th>
                                <th width="150">招标人</th>
                                <th width="120">标包/标的</th>
                                <th width="100">预计金额</th>
                                <th width="100">招标方式</th>
                                <th width="120">文件获取截止</th>
                                <th width="120">递交截止</th>
                                <th width="70">类别</th>
                                <th width="100">来源</th>
                                <th width="100">发布日期</th>
                            </tr>
                        </thead>
                        <tbody id="dataBody">
                            <tr>
                                <td colspan="11" class="empty-state">暂无数据，请先执行爬取</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 分页 -->
                <div class="pagination" id="pagination"></div>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>

    <!-- 文件夹选择器弹窗 -->
    <div class="modal-overlay" id="folderPickerModal">
        <div class="modal">
            <div class="modal-header">
                <h3>📂 选择导出目录</h3>
                <button class="btn btn-ghost btn-sm" onclick="closeFolderPicker()">✕</button>
            </div>
            <div class="modal-path" id="folderCurrentPath">-</div>
            <div class="modal-body">
                <div class="folder-list" id="folderList">
                    <p class="log-placeholder">加载中...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeFolderPicker()">取消</button>
                <button class="btn btn-primary" onclick="selectFolder()">✅ 选择此目录</button>
            </div>
        </div>
    </div>
</body>

</html>
